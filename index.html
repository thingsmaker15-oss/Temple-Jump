<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Temple Jump</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Press Start 2P', cursive;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* UI Overlays */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.85); /* Default for Game Over Screen */
            color: white;
            z-index: 20;
            text-align: center;
        }
        
        /* New Menu Screen Background */
        #menuScreen {
            background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('1000299018.jpg');
            background-size: cover;
            background-position: center;
        }

        .hidden { display: none !important; }

        .character-card {
            background: rgba(255, 255, 255, 0.1);
            border: 4px solid transparent;
            transition: all 0.2s ease-in-out;
            cursor: pointer;
            border-radius: 12px;
            backdrop-filter: blur(2px); /* Adds a nice frosted glass effect over the background */
        }
        .character-card.selected {
            border-color: #FFD700;
            background: rgba(255, 215, 0, 0.3);
            transform: scale(1.05);
        }

        .pixel-btn {
            background-color: #FFD700;
            color: #000;
            border: 4px solid #fff;
            padding: 15px 30px;
            font-family: 'Press Start 2P', cursive;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 4px 4px 0px #fff;
            margin-top: 20px;
        }
        .pixel-btn:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px #fff;
        }

        /* Fixed HUD Layout */
        #uiHUD {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            text-shadow: 2px 2px 0 #000;
            z-index: 5;
            pointer-events: none;
            display: flex;
            justify-content: space-between;
            width: calc(100% - 40px);
        }

        /* Mobile Controls */
        #mobileControls {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 10;
        }
        .control-group { display: flex; gap: 15px; }
        .btn-game {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.3);
            border: 3px solid rgba(255, 255, 255, 0.7);
            border-radius: 50%;
            color: white;
            font-size: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
        }
        .btn-game:active { background: rgba(255, 215, 0, 0.5); }
        
        @media (min-width: 1024px) { #mobileControls { display: none; } }
    </style>
</head>
<body>

    <!-- HUD -->
    <div id="uiHUD" class="hidden items-start">
        <div class="flex flex-col gap-2 text-left">
            <div class="text-[10px] md:text-base">Score: <span id="currentScore">0</span></div>
            <div class="text-[8px] md:text-xs text-yellow-400">HI: <span id="highScoreHUD">0</span></div>
        </div>
        <div class="text-[10px] md:text-base text-right">Scene: <span id="currentScene">1</span></div>
    </div>

    <!-- Mobile Controls -->
    <div id="mobileControls" class="hidden">
        <div class="control-group">
            <div class="btn-game" id="btnLeft">◄</div>
            <div class="btn-game" id="btnRight">►</div>
        </div>
        <div class="control-group">
            <div class="btn-game" id="btnJump">▲</div>
        </div>
    </div>

    <!-- Main Menu -->
    <div id="menuScreen" class="overlay">
        <h1 class="text-3xl md:text-5xl mb-8 text-yellow-400" style="text-shadow: 3px 3px 0 #8b4513;">TEMPLE JUMP</h1>
        <p class="mb-4 text-xs md:text-sm text-white drop-shadow-md">Select Character:</p>
        
        <div class="flex flex-row gap-4 mb-4">
            <div class="character-card p-2 md:p-4 flex flex-col items-center selected" onclick="selectCharacter('priyanka')" id="card-priyanka">
                <div class="h-24 md:h-32 w-16 md:w-24 mb-2 flex justify-center items-center text-[8px] text-gray-400 text-center">
                    <img src="player_chithra.png" alt="Priyanka img missing" class="max-h-full max-w-full object-contain" onerror="this.onerror=null; this.src='walk_1_chithra.png';">
                </div>
                <span class="text-[10px] md:text-xs text-white">Priyanka</span>
            </div>
            <div class="character-card p-2 md:p-4 flex flex-col items-center" onclick="selectCharacter('kiran')" id="card-kiran">
                 <div class="h-24 md:h-32 w-16 md:w-24 mb-2 flex justify-center items-center text-[8px] text-gray-400 text-center">
                    <img src="player_lungiman.png" alt="Kiran img missing" class="max-h-full max-w-full object-contain" onerror="this.onerror=null;">
                </div>
                <span class="text-[10px] md:text-xs text-white">Kiran</span>
            </div>
        </div>

        <button class="pixel-btn text-sm md:text-base" onclick="startGame()">Start Game</button>
    </div>

    <!-- Game Over Screen -->
    <div id="gameOverScreen" class="overlay hidden">
        <h1 class="text-4xl md:text-5xl mb-4 text-red-500">GAME OVER</h1>
        <p class="text-sm md:text-lg mb-2">You touched a notebook!</p>
        <p class="text-sm md:text-lg mb-8 text-yellow-400">High Score: <span id="gameOverHighScore">0</span></p>
        <button class="pixel-btn text-sm md:text-base" onclick="showMenu()">Main Menu</button>
    </div>

    <!-- Canvas -->
    <canvas id="gameCanvas"></canvas>

<script>
    // --- Exact File Asset Management ---
    const assets = { images: {}, audio: {} };
    let assetsLoaded = 0;
    let hasLoadedMenu = false;

    const imageFiles = {
        'bg': 'bg.png',
        'block': 'block.png', 
        'coin': 'coin_spritesheet.png',
        'notebook': 'notebook.png', 
        'pot': 'pot.png',
        'statue': 'statue.png',
        'pillar_1': 'pillar_1.png',
        'pillar_2': 'pillar_2.png',
        'platform_1': 'platform_1.png',
        'platform_2': 'platform_2.png',
        'jump_chithra': 'jump_chithra.png',
        'idle_chithra': 'player_chithra.png',
        'walk_1_c': 'walk_1_chithra.png',
        'walk_2_c': 'walk_2_chithra.png',
        'walk_3_c': 'walk_3_chithra.png',
        'walk_4_c': 'walk_4_chithra.png',
        'jump_lungiman': 'jump_lungiman.png',
        'idle_lungiman': 'player_lungiman.png',
        'walk_1_l': 'walk_1_lungiman.png',
        'walk_2_l': 'walk_2_lungiman.png',
        'walk_3_l': 'walk_3_lungiman.png',
        'walk_4_l': 'walk_4_lungiman.png'
    };

    const totalAssets = Object.keys(imageFiles).length;

    function checkLoad() {
        assetsLoaded++;
        if (assetsLoaded >= totalAssets && !hasLoadedMenu) {
            hasLoadedMenu = true; showMenu();
        }
    }

    for (let key in imageFiles) {
        let img = new Image();
        img.onload = checkLoad;
        img.onerror = () => { console.warn(`Missing file: ${imageFiles[key]}`); checkLoad(); };
        img.src = imageFiles[key];
        assets.images[key] = img;
    }
    setTimeout(() => { if (!hasLoadedMenu) { hasLoadedMenu = true; showMenu(); } }, 1500);

    function createSafeAudio(src) {
        try { return new Audio(src); } 
        catch (e) { return { play: () => Promise.resolve(), pause: () => {}, cloneNode: function(){return this;} }; }
    }
    assets.audio.bgm = createSafeAudio('bgm.mp3');
    assets.audio.jump = createSafeAudio('jump.wav');
    assets.audio.coin = createSafeAudio('coin.wav.mp3');
    assets.audio.gameover = createSafeAudio('gameover.wav');

    // --- Game Variables ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    const V_WIDTH = 800;
    const V_HEIGHT = 450;
    const TILE_SIZE = 40; 
    const GROUND_Y = V_HEIGHT - TILE_SIZE;
    
    let gameState = 'menu';
    let selectedChar = 'priyanka';
    let score = 0;
    let highScore = localStorage.getItem('templeJumpHighScore') || 0;
    let currentSceneIdx = 0;
    let animFrame = 0;
    
    let keys = { left: false, right: false, jump: false, jumpPressed: false };
    
    let raindrops = [];

    // --- Canvas Sizing ---
    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const scale = Math.min(window.innerWidth / V_WIDTH, window.innerHeight / V_HEIGHT);
        ctx.setTransform(scale, 0, 0, scale, 
            (window.innerWidth - V_WIDTH * scale) / 2, 
            (window.innerHeight - V_HEIGHT * scale) / 2);
    }
    window.addEventListener('resize', resizeCanvas);
    setTimeout(resizeCanvas, 100);

    function safeDrawImage(imgKey, sx, sy, sw, sh, dx, dy, dw, dh) {
        let img = assets.images[imgKey];
        if (!img || !img.complete || img.naturalWidth === 0) {
            ctx.fillStyle = '#FF00FF'; 
            if (arguments.length === 5) ctx.fillRect(sx, sy, sw, sh);
            else if (arguments.length === 9) ctx.fillRect(dx, dy, dw, dh);
            return false;
        }
        try {
            if (arguments.length === 5) ctx.drawImage(img, sx, sy, sw, sh);
            else if (arguments.length === 9) ctx.drawImage(img, sx, sy, sw, sh, dx, dy, dw, dh);
            return true;
        } catch (e) { return false; }
    }

    class Player {
        constructor() {
            this.w = 50; this.h = 80;
            this.x = 50; this.y = GROUND_Y - this.h;
            this.vx = 0; this.vy = 0;
            this.speed = 2.5; 
            this.gravity = 0.6;
            this.jumpPower = -11;
            this.jumps = 0; this.maxJumps = 2;
            this.facingRight = true;
            this.walkTimer = 0;
        }
        update(platforms) {
            if (keys.left) { this.vx = -this.speed; this.facingRight = false; }
            else if (keys.right) { this.vx = this.speed; this.facingRight = true; }
            else { this.vx = 0; }

            this.x += this.vx;
            if (this.x < 0) this.x = 0; 

            platforms.forEach(p => {
                if (this.checkCollision(p)) {
                    if (this.vx > 0) this.x = p.x - this.w;
                    else if (this.vx < 0) this.x = p.x + p.w;
                }
            });

            this.vy += this.gravity;
            this.y += this.vy;

            let isGrounded = false;
            if (this.y >= GROUND_Y - this.h) {
                this.y = GROUND_Y - this.h;
                this.vy = 0;
                isGrounded = true;
            }

            platforms.forEach(p => {
                if (this.checkCollision(p)) {
                    if (this.vy > 0) { 
                        this.y = p.y - this.h;
                        this.vy = 0; isGrounded = true;
                    } else if (this.vy < 0) { 
                        this.y = p.y + p.h; this.vy = 0;
                    }
                }
            });

            if (isGrounded) this.jumps = 0;
            if (keys.jump && !keys.jumpPressed && this.jumps < this.maxJumps) {
                this.vy = this.jumpPower; this.jumps++; keys.jumpPressed = true; 
                try { let s = assets.audio.jump.cloneNode(); s.volume = 0.5; s.play().catch(e=>{}); } catch(e){}
            }
        }
        checkCollision(rect) {
            return (this.x < rect.x + rect.w && this.x + this.w > rect.x &&
                    this.y < rect.y + rect.h && this.y + this.h > rect.y);
        }
        draw() {
            let imgKey = '';
            if (this.vy !== 0 || this.jumps > 0) imgKey = selectedChar === 'priyanka' ? 'jump_chithra' : 'jump_lungiman';
            else if (this.vx !== 0) {
                this.walkTimer++;
                let frameNum = (Math.floor(this.walkTimer / 8) % 4) + 1; 
                imgKey = selectedChar === 'priyanka' ? `walk_${frameNum}_c` : `walk_${frameNum}_l`;
            } else {
                this.walkTimer = 0;
                imgKey = selectedChar === 'priyanka' ? 'idle_chithra' : 'idle_lungiman';
            }
            ctx.save();
            if (!this.facingRight) { ctx.translate(this.x + this.w, this.y); ctx.scale(-1, 1); safeDrawImage(imgKey, 0, 0, this.w, this.h); } 
            else { safeDrawImage(imgKey, this.x, this.y, this.w, this.h); }
            ctx.restore();
        }
    }

    let player;
    let currentPlatforms = [];
    let currentEnemies = [];
    let currentCoins = [];

    function loadScene(index) {
        currentSceneIdx = index;
        document.getElementById('currentScene').innerText = index + 1;
        
        currentPlatforms = []; currentEnemies = []; currentCoins = [];
        let lastPlacedX = 150; 
        
        let maxObjects = Math.min(3 + (index * 1.5), 10);
        let enemySpawnChance = Math.min(0.2 + (index * 0.1), 0.7);
        let baseEnemySpeed = Math.min(2 + (index * 0.4), 6);
        let enemyMoveChance = Math.min(0.3 + (index * 0.1), 0.9);

        raindrops = [];
        if (Math.random() < 0.35) { 
            for(let i=0; i<150; i++) {
                raindrops.push({
                    x: Math.random() * V_WIDTH, y: Math.random() * V_HEIGHT,
                    l: Math.random() * 15 + 10, v: Math.random() * 6 + 8
                });
            }
        }

        for(let i = 0; i < maxObjects; i++) {
            let xPos = lastPlacedX + 80 + (Math.random() * 150);
            if (xPos > V_WIDTH - 80) break;

            let rng = Math.random();
            let newPlatform = { x: xPos, y: 0, w: 0, h: 0, img: '' };
            let isFloating = false; 

            if (rng < 0.20) { newPlatform.w = 60; newPlatform.h = 90; newPlatform.y = GROUND_Y - newPlatform.h; newPlatform.img = 'pot'; } 
            else if (rng < 0.40) { newPlatform.w = 60; newPlatform.h = 120; newPlatform.y = GROUND_Y - newPlatform.h; newPlatform.img = 'statue'; } 
            else if (rng < 0.60) { newPlatform.w = 60; newPlatform.h = 150; newPlatform.y = GROUND_Y - newPlatform.h; newPlatform.img = 'pillar_1'; } 
            else if (rng < 0.80) { newPlatform.w = 60; newPlatform.h = 130; newPlatform.y = GROUND_Y - newPlatform.h; newPlatform.img = 'pillar_2'; } 
            else { newPlatform.w = 200; newPlatform.h = 20; newPlatform.y = GROUND_Y - 100 - (Math.random() * 50); newPlatform.img = 'platform_1'; isFloating = true; }
            
            currentPlatforms.push(newPlatform);

            if (Math.random() > 0.4) {
                currentCoins.push({ x: newPlatform.x + (newPlatform.w / 2) - 15, y: newPlatform.y - 45, w: 30, h: 30, collected: false });
            }

            let enemySpawned = false; let enemyX = 0;
            
            if (Math.random() < enemySpawnChance) { 
                enemyX = isFloating ? xPos + 20 : xPos + newPlatform.w + 50;
                if (enemyX < V_WIDTH - 50) {
                    currentEnemies.push({
                        x: enemyX, y: GROUND_Y - 40, w: 40, h: 40, 
                        img: 'notebook', 
                        speed: (Math.random() < enemyMoveChance ? baseEnemySpeed : 0),
                        startX: enemyX 
                    });
                    enemySpawned = true;
                }
            }
            lastPlacedX = newPlatform.x + newPlatform.w;
            if (enemySpawned) lastPlacedX = Math.max(lastPlacedX, enemyX + 40);
        }

        if(player) { player.x = 20; player.y = GROUND_Y - player.h; player.vy = 0; }
    }

    function selectCharacter(charId) {
        selectedChar = charId;
        document.getElementById('card-priyanka').classList.remove('selected'); 
        document.getElementById('card-kiran').classList.remove('selected');
        document.getElementById(`card-${charId}`).classList.add('selected');
    }
    
    function showMenu() {
        gameState = 'menu';
        document.getElementById('gameOverScreen').classList.add('hidden'); document.getElementById('uiHUD').classList.add('hidden');
        document.getElementById('mobileControls').classList.add('hidden'); document.getElementById('menuScreen').classList.remove('hidden');
        try { assets.audio.bgm.pause(); assets.audio.bgm.currentTime = 0; } catch(e){}
        ctx.save(); ctx.setTransform(1, 0, 0, 1, 0, 0); ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.restore();
        // Fallback draw in case background hasn't loaded fully
        safeDrawImage('bg', 0, 0, V_WIDTH, V_HEIGHT);
    }
    
    function startGame() {
        document.getElementById('menuScreen').classList.add('hidden'); document.getElementById('gameOverScreen').classList.add('hidden');
        document.getElementById('uiHUD').classList.remove('hidden'); document.getElementById('mobileControls').classList.remove('hidden');
        document.getElementById('highScoreHUD').innerText = highScore; 
        
        try { assets.audio.bgm.loop=true; assets.audio.bgm.volume=0.5; assets.audio.bgm.play().catch(e=>{}); } catch(e){}
        
        player = new Player(); score = 0; document.getElementById('currentScore').innerText = score;
        loadScene(0); gameState = 'playing'; requestAnimationFrame(gameLoop);
    }
    
    function gameOver() {
        gameState = 'gameover'; keys = { left: false, right: false, jump: false, jumpPressed: false }; 
        try { assets.audio.bgm.pause(); assets.audio.gameover.play().catch(e=>{}); } catch(e){}
        
        document.getElementById('uiHUD').classList.add('hidden'); document.getElementById('mobileControls').classList.add('hidden');
        document.getElementById('gameOverHighScore').innerText = highScore;
        document.getElementById('gameOverScreen').classList.remove('hidden');
    }

    function gameLoop() {
        if (gameState !== 'playing') return;
        animFrame++;

        ctx.save(); ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#111'; ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.restore();

        safeDrawImage('bg', 0, 0, V_WIDTH, V_HEIGHT);

        let timeOfDay = currentSceneIdx % 3; 

        ctx.save();
        ctx.beginPath();
        if (timeOfDay === 0) {
            ctx.arc(80, 80, 35, 0, Math.PI * 2);
            ctx.fillStyle = '#FFF570'; ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 30;
        } else if (timeOfDay === 1) {
            ctx.arc(V_WIDTH - 40, 100, 45, 0, Math.PI * 2);
            ctx.fillStyle = '#FF6347'; ctx.shadowColor = '#FF4500'; ctx.shadowBlur = 40;
        } else if (timeOfDay === 2) {
            ctx.arc(80, 80, 25, 0, Math.PI * 2);
            ctx.fillStyle = '#E0E8F5'; ctx.shadowColor = '#FFFFFF'; ctx.shadowBlur = 20;
        }
        ctx.fill();
        ctx.restore();

        ctx.save();
        if (timeOfDay === 1) { ctx.fillStyle = 'rgba(255, 90, 0, 0.25)'; ctx.fillRect(0, 0, V_WIDTH, V_HEIGHT); } 
        else if (timeOfDay === 2) { ctx.fillStyle = 'rgba(0, 10, 40, 0.65)'; ctx.fillRect(0, 0, V_WIDTH, V_HEIGHT); }
        ctx.restore();

        for (let x = 0; x < V_WIDTH; x += TILE_SIZE) { safeDrawImage('block', x, GROUND_Y, TILE_SIZE + 1, TILE_SIZE + 1); }

        currentPlatforms.forEach(p => safeDrawImage(p.img, p.x, p.y, p.w, p.h));
        currentCoins.forEach(c => {
            if (c.collected) return;
            let cImg = assets.images['coin'];
            if (cImg && cImg.naturalWidth > 0) {
                let frameW = cImg.width / 4; let cFrame = Math.floor(animFrame / 10) % 4; 
                safeDrawImage('coin', cFrame * frameW, 0, frameW, cImg.height, c.x, c.y, c.w, c.h);
            } else { ctx.fillStyle = '#FFD700'; ctx.beginPath(); ctx.arc(c.x + c.w/2, c.y + c.h/2, c.w/2, 0, Math.PI * 2); ctx.fill(); }
            
            if (player.checkCollision(c)) {
                c.collected = true; 
                score += 10; 
                document.getElementById('currentScore').innerText = score;
                
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('templeJumpHighScore', highScore);
                    document.getElementById('highScoreHUD').innerText = highScore;
                }
                
                try { let s = assets.audio.coin.cloneNode(); s.volume=0.6; s.play().catch(e=>{}); } catch(e){}
            }
        });

        currentEnemies.forEach(e => {
            if (e.speed) {
                e.x += e.speed;
                if (e.x > e.startX + 100 || e.x < e.startX - 100) { e.speed *= -1; }
            }
            safeDrawImage(e.img, e.x, e.y, e.w, e.h);
            let enemyHitbox = { x: e.x+5, y: e.y+5, w: e.w-10, h: e.h-10 };
            if (player.checkCollision(enemyHitbox)) gameOver();
        });

        player.update(currentPlatforms);
        player.draw();

        if (raindrops.length > 0) {
            ctx.save();
            ctx.strokeStyle = 'rgba(220, 230, 255, 0.6)';
            ctx.lineWidth = 1;
            ctx.lineCap = 'round';
            ctx.beginPath();
            for(let i = 0; i < raindrops.length; i++) {
                let r = raindrops[i];
                ctx.moveTo(r.x, r.y);
                ctx.lineTo(r.x + (r.v * 0.2), r.y + r.l); 
                r.y += r.v;
                r.x += (r.v * 0.2); 
                
                if (r.y > GROUND_Y) {
                    r.y = -20;
                    r.x = Math.random() * V_WIDTH;
                }
            }
            ctx.stroke();
            ctx.restore();
        }

        if (player.x > V_WIDTH) { loadScene(currentSceneIdx + 1); }

        if (gameState === 'playing') requestAnimationFrame(gameLoop);
    }

    window.addEventListener('keydown', (e) => {
        if(e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = true;
        if(e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = true;
        if(e.code === 'ArrowUp' || e.code === 'Space') keys.jump = true;
    });
    window.addEventListener('keyup', (e) => {
        if(e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
        if(e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
        if(e.code === 'ArrowUp' || e.code === 'Space') { keys.jump = false; keys.jumpPressed = false; }
    });

    function bindBtn(id, keyName) {
        let btn = document.getElementById(id);
        const press = (e) => { e.preventDefault(); keys[keyName] = true; };
        const release = (e) => { e.preventDefault(); keys[keyName] = false; if(keyName==='jump') keys.jumpPressed = false; };
        btn.addEventListener('touchstart', press); btn.addEventListener('touchend', release);
        btn.addEventListener('mousedown', press); btn.addEventListener('mouseup', release); btn.addEventListener('mouseleave', release);
    }
    bindBtn('btnLeft', 'left'); bindBtn('btnRight', 'right'); bindBtn('btnJump', 'jump');

</script>
</body>
</html>
